<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox · Discord-like Voice Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран входа -->
    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">Vox</div>
                <h2>Добро пожаловать</h2>
                <p>Введите код доступа для входа</p>
            </div>
            
            <div class="auth-content">
                <input type="password" id="access-code" placeholder="Код доступа" class="auth-input">
                <button id="submit-access" class="auth-button">Войти</button>
                <div id="auth-error" class="auth-error hidden">Неверный код</div>
            </div>
        </div>
    </div>

    <!-- Экран выбора комнаты -->
    <div id="lobby-screen" class="screen hidden">
        <div class="lobby-container">
            <div class="lobby-header">
                <div class="logo">Vox</div>
                <button id="logout-btn" class="icon-button" title="Выйти">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>

            <div class="lobby-content">
                <div class="user-section">
                    <div class="user-info">
                        <div class="user-avatar" id="lobby-avatar">U</div>
                        <div class="user-details">
                            <input type="text" id="lobby-username" placeholder="Ваше имя" maxlength="20">
                            <span class="user-status">➡️ Введите имя</span>
                        </div>
                    </div>
                </div>

                <div class="room-actions">
                    <button id="lobby-create" class="primary-button" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        Создать комнату
                    </button>

                    <div class="or-divider">или</div>

                    <div class="join-room">
                        <input type="text" id="lobby-room-code" placeholder="Код комнаты" maxlength="6">
                        <button id="lobby-join" class="secondary-button" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 12H4M12 4l8 8-8 8"/>
                            </svg>
                            Присоединиться
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран звонка - Discord стиль -->
    <div id="call-screen" class="screen hidden">
        <div class="call-container">
            <!-- Левая панель (участники) -->
            <div class="members-sidebar">
                <div class="members-header">
                    <div class="room-info">
                        <span class="room-label">КОМНАТА</span>
                        <span id="call-room-code" class="room-code"></span>
                    </div>
                    <button id="copy-room-code" class="copy-code-btn" title="Копировать код">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>

                <div class="members-list" id="members-list">
                    <!-- Участники будут добавляться сюда -->
                </div>

                <div class="connection-status" id="connection-status">
                    <div class="status-dot online"></div>
                    <span>Подключено</span>
                </div>
            </div>

            <!-- Основная область -->
            <div class="call-main">
                <!-- Область демонстрации экрана -->
                <div id="screen-share-area" class="screen-share-area hidden">
                    <div class="screen-share-header">
                        <span class="screen-share-label">📺 Демонстрация экрана</span>
                        <div class="screen-share-controls">
                            <button id="fullscreen-screen" class="screen-control-btn" title="На весь экран">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                                </svg>
                            </button>
                            <button id="stop-screen-share" class="screen-control-btn stop" title="Остановить">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <video id="screen-video" autoplay playsinline></video>
                </div>

                <!-- Сетка с аватарками участников -->
                <div class="voice-chat-grid" id="voice-grid">
                    <!-- Аватарки будут добавляться динамически -->
                </div>

                <!-- Панель управления -->
                <div class="voice-controls">
                    <div class="user-controls-left">
                        <div class="current-user" id="current-user-info">
                            <div class="current-user-avatar" id="current-user-avatar">U</div>
                            <div class="current-user-name" id="current-user-name"></div>
                        </div>
                    </div>

                    <div class="voice-actions">
                        <button id="mute-toggle" class="control-button" title="Отключить микрофон">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                                <line x1="3" y1="11" x2="21" y2="11"/>
                            </svg>
                        </button>
                        
                        <button id="deafen-toggle" class="control-button" title="Отключить звук">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                                <line x1="3" y1="11" x2="21" y2="11"/>
                                <line x1="3" y1="3" x2="21" y2="21"/>
                            </svg>
                        </button>
                        
                        <button id="screen-share-toggle" class="control-button" title="Демонстрация экрана">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </button>
                        
                        <button id="leave-call" class="control-button danger" title="Покинуть звонок">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="user-controls-right">
                        <!-- Пусто для баланса -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню для регулировки громкости -->
    <div id="volume-context" class="context-menu hidden">
        <div class="context-item">
            <span>Громкость</span>
            <input type="range" id="user-volume" min="0" max="100" value="100">
            <span id="volume-percent">100%</span>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notification" class="notification hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
